services:
  - type: web
    name: turni-aquamore
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: CLIENT_ID
        value: aquamore
      - key: LICENSE_CONTROL_URL
        value: https://turni-ristorante.onrender.com
      - key: MANAGER_PASSWORD
        sync: false
    disk:
      name: turni-aquamore-data
      mountPath: /var/data
      sizeGB: 1
